<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>나의 여행 발자국</title>

    <!-- CSS 파일 연결 -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="container">

        <h2>나의 여행 발자국 ✈️</h2>

        <!-- 오디오 -->
        <audio controls>
            <source src="/media/happy.mp3" type="audio/mpeg">
            브라우저가 오디오를 지원하지 않습니다.
        </audio>

        <!-- 여행 카드들을 감싸는 Grid 부모 -->
        <div class="trip-grid-container">

            <p class="trip-card">
                <img src="/media/paris.jpeg" alt="파리 여행 사진">
                <small>2024 파리</small>
            </p>

            <p class="trip-card">
                <img src="/media/swiss.jpeg" alt="스위스 여행 사진">
                <small>2024 스위스</small>
            </p>

            <p class="trip-card">
                <img src="/media/swiss_2.jpeg" alt="스위스 두 번째 여행 사진">
                <small>2024 스위스 2</small>
            </p>

            <p class="trip-card">
                <img src="/media/italy.jpeg" alt="이탈리아 여행 사진">
                <small>2025 이탈리아</small>
            </p>

            <p class="trip-card">
                <img src="/media/italy_2.jpeg" alt="이탈리아 두 번째 여행 사진">
                <small>2025 이탈리아 2</small>
            </p>

            <p class="trip-card">
                <img src="/media/la.jpeg" alt="LA 첫 번째 여행 사진">
                <small>2025 LA 1</small>
            </p>

            <p class="trip-card">
                <img src="/media/la2.jpeg" alt="LA 두 번째 여행 사진">
                <small>2025 LA 2</small>
            </p>

            <p class="trip-card">
                <img src="/media/la3.jpeg" alt="LA 세 번째 여행 사진">
                <small>2025 LA 3</small>
            </p>

        </div>

        <h3>캐나다 캘거리 브이로그</h3>

        <p class="trip-card video-card">
            <video controls>
                <source src="/media/canada.mp4" type="video/mp4">
                브라우저가 비디오를 지원하지 않습니다.
            </video>

            <small>캐나다 캘거리 여행</small>
        </p>

    </div>
</body>
</html>
