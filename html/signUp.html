<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <!-- CSS 파일 연결 -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    
    <h2>회원가입</h2>
    <p>SKALA-FRONT 회원가입을 환영합니다.</p>

    <form action="signUpResult.html" method="get">

        <fieldset>
            <legend>계정 정보</legend>

            <label for="id">아이디: </label>
            <input type="text" id="id" name="id"
            placeholder="4~15자 영문/숫자"
            required>
            <br><br>

            <label for="pw">비밀번호 :</label>
            <input type="password" id="pw" name="pw"
               placeholder="8자 이상 입력"
               required>
            <br><br>

            <label for="email">이메일 :</label>
            <input type="text" id="email" name="email"
               placeholder="example"
               required>

            @

            <select name="domain">
                <option>직접 입력</option>
                <option>naver.com</option>
                <option>gmail.com</option>
                <option>daum.net</option>
            </select> 

        </fieldset>

        <br>

        <fieldset>
            <legend>개인 프로필 정보</legend>

            <label for="name">이름: </label>
            <input type="text" id="name" name="name">
            <br><br>

            <label for="birth">생년월일: </label>
            <input type="date" id="birth" name="birth">
            <br><br>

            <label for="gender">성별: </label>
            <input type="radio" id="male" name="gender" value="남성">
            <label for="male">남성</label>

            <input type="radio" id="female" name="gender" value="여성">
            <label for="female">여성</label>

            <input type="radio" id="none" name="gender" value="선택안함">
            <label for="none">선택안함</label>

            <br><br>

            관심분야 (중복 선택 가능)
            <br>

            <input type="checkbox" id="web">
            <label for="web">웹 프론트엔드 (Vue.js / HTML)</label><br>

            <input type="checkbox" id="ui">
            <label for="ui">UI/UX 디자인 표준</label><br>

            <input type="checkbox" id="db">
            <label for="db">빅데이터 & 데이터베이스</label><br>

            <input type="checkbox" id="cloud">
            <label for="cloud">클라우드 & 인프라</label>

            <br><br>

            <label for="grade">가입 경로</label>

            <select id="grade" name="grade">
                <option>--선택해주세요--</option>
                <option>인터넷 검색</option>
                <option>SNS</option>
                <option>지인 추천</option>
            </select>
        </fieldset>

        <br>

        <fieldset>
            <legend>자기소개</legend>

            <label for="intro">나를 표현하는 한 줄 소개 또는 가입 인사: </label>
            <br>

            <textarea id="intro" name="intro" rows="5" cols="40" placeholder="자기를 소개해 주세요."></textarea>
        </fieldset>

        <br>

        <input type="submit" value="동의하고 회원가입">
        <input type="reset" value="다시 작성">
    </form>
</body>
</html>
